<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ouma Hive Creatives</title>
  <style>
    /* ===== Global Styles ===== */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #f0f2f5;
      color: #1c1e21;
    }
    header {
      background: #fff;
      padding: 1rem 2rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #1877f2;
    }
    .filters {
      display: flex;
      gap: 1rem;
    }
    .filters button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 20px;
      background: #e4e6eb;
      cursor: pointer;
      transition: background 0.3s;
    }
    .filters button.active,
    .filters button:hover {
      background: #1877f2;
      color: #fff;
    }

    /* ===== Feed ===== */
    .feed {
      max-width: 900px;
      margin: 2rem auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 0 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .card img {
      width: 100%;
      display: block;
      cursor: pointer;
    }
    .card-content {
      padding: 1rem;
    }
    .card-content h2 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }
    .card-content p {
      margin: 0 0 0.5rem;
      color: #606770;
    }
    .card-content .tools {
      font-size: 0.9rem;
      color: #90949c;
    }
    .card-actions {
      display: flex;
      gap: 1rem;
      padding: 0.5rem 1rem 1rem;
      border-top: 1px solid #e4e6eb;
    }
    .card-actions button {
      border: none;
      background: none;
      color: #606770;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .card-actions button:hover {
      color: #1877f2;
    }

    /* ===== Modal ===== */
    .modal {
      display: none;
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-content {
      background: #fff;
      border-radius: 12px;
      max-width: 90%;
      max-height: 90%;
      overflow-y: auto;
      padding: 1rem;
      position: relative;
    }
    .modal-content img {
      width: 100%;
      display: block;
      margin-bottom: 1rem;
      border-radius: 8px;
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #1877f2;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .filters {
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header>
    <h1>Ouma Hive Creatives</h1>
    <div class="filters">
      <button class="active" data-category="all">All</button>
      <button data-category="graphic">Graphics</button>
      <button data-category="motion">Motion</button>
      <button data-category="branding">Branding</button>
      <button data-category="social">Social</button>
    </div>
  </header>

  <!-- ===== Feed ===== -->
  <div class="feed" id="feed">
    <!-- Card Example -->
    <div class="card" data-category="graphic">
      <img src="https://source.unsplash.com/random/800x450?design" alt="Creative 1">
      <div class="card-content">
        <h2>Creative Graphic Design</h2>
        <p>Modern poster design for a digital campaign.</p>
        <p class="tools">Tools: Illustrator, Photoshop</p>
      </div>
      <div class="card-actions">
        <button>👍 Like</button>
        <button>💬 Comment</button>
        <button>🔗 Share</button>
      </div>
    </div>

    <div class="card" data-category="motion">
      <img src="https://source.unsplash.com/random/800x450?motion" alt="Creative 2">
      <div class="card-content">
        <h2>Motion Graphics Project</h2>
        <p>Animated short for social media promotion.</p>
        <p class="tools">Tools: After Effects, Premiere Pro</p>
      </div>
      <div class="card-actions">
        <button>👍 Like</button>
        <button>💬 Comment</button>
        <button>🔗 Share</button>
      </div>
    </div>

    <!-- Add more cards here -->
  </div>

  <!-- ===== Modal ===== -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">×</button>
      <img id="modal-img" src="" alt="Creative">
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
      <p id="modal-tools"></p>
    </div>
  </div>

  <!-- ===== Scripts ===== -->
  <script>
    // ===== Filter Buttons =====
    const filterButtons = document.querySelectorAll('.filters button');
    const cards = document.querySelectorAll('.card');

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const category = btn.dataset.category;
        cards.forEach(card => {
          if(category === 'all' || card.dataset.category === category){
            card.style.display = 'block';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });

    // ===== Modal =====
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');
    const modalTools = document.getElementById('modal-tools');
    const modalClose = document.getElementById('modal-close');

    cards.forEach(card => {
      card.querySelector('img').addEventListener('click', () => {
        modal.style.display = 'flex';
        modalImg.src = card.querySelector('img').src;
        modalTitle.textContent = card.querySelector('h2').textContent;
        modalDesc.textContent = card.querySelector('p').textContent;
        modalTools.textContent = card.querySelector('.tools').textContent;
      });
    });

    modalClose.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    modal.addEventListener('click', (e) => {
      if(e.target === modal) modal.style.display = 'none';
    });
  </script>

</body>
</html>
