
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending Products SA</title>
<style>
  /* Base Reset */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', Arial, sans-serif; }
  body { background:#f0f0f5; color:#222; }

  /* Header / Navigation */
  header {
    display:flex;
    justify-content: space-between;
    align-items: center;
    padding:20px 30px;
    background:#111;
    color:white;
    position: sticky;
    top: 0;
    z-index:1000;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  header h2 { font-size:1.8em; font-weight:800; letter-spacing:1px; }
  nav a {
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:600;
    transition: 0.3s;
  }
  nav a:hover { color:#ffdd00; transform:scale(1.1); }

  /* Hero Section */
  .hero {
    background: linear-gradient(135deg, #ffcc00, #ff9900);
    color:#111;
    text-align:center;
    padding:80px 20px;
    border-radius:0 0 40px 40px;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
  }
  .hero h1 { font-size:3em; font-weight:900; margin-bottom:15px; text-shadow:2px 2px 5px rgba(0,0,0,0.2);}
  .hero p { font-size:1.4em; margin-bottom:30px; }
  .cta-button {
    padding:18px 40px;
    background:#111;
    color:#ffdd00;
    font-weight:800;
    text-decoration:none;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    transition:0.3s;
  }
  .cta-button:hover {
    background:#222;
    transform: translateY(-3px) scale(1.05);
    box-shadow:0 12px 25px rgba(0,0,0,0.4);
  }

  /* Products Grid */
  .container {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:30px;
    padding:40px 20px;
  }

  .card {
    background:white;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-10px);
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
  }
  .card img { width:100%; border-radius:15px; transition: transform 0.3s; }
  .card:hover img { transform: scale(1.05); }
  .card h3 { margin:15px 0 10px; font-size:1.3em; font-weight:700; }
  .card p { margin:5px 0; font-size:1.1em; font-weight:600; color:#ff5500; }

  /* Premium “Buy Now” Button */
  .card button {
    padding:12px 25px;
    background:#ffdd00;
    color:#111;
    font-weight:700;
    border:none;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    margin-top:10px;
  }
  .card button:hover {
    background:#ffcc00;
    transform: translateY(-3px) scale(1.05);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
  }

  /* Scarcity / Urgency Badge */
  .badge {
    position: absolute;
    top:15px;
    right:15px;
    background:#ff0000;
    color:white;
    font-weight:700;
    padding:5px 12px;
    border-radius:10px;
    font-size:0.9em;
    text-transform:uppercase;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
  }

  /* Footer */
  footer {
    text-align:center;
    padding:20px;
    background:#111;
    color:white;
    margin-top:40px;
    box-shadow:0 -5px 15px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<header>
  <h2>Trending Products SA</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Trending Products in South Africa</h1>
  <p>Hot items, unbeatable prices — grab them before they’re gone!</p>
  <a href="#products" class="cta-button">Shop Now</a>
</section>

<section id="products" class="container">
  <div class="card">
    <div class="badge">Hot!</div>
    <img src="images/product1.jpg" alt="Product 1">
    <h3>Product 1</h3>
    <p>R299</p>
    <button>Buy Now</button>
  </div>
  <div class="card">
    <div class="badge">Limited</div>
    <img src="images/product2.jpg" alt="Product 2">
    <h3>Product 2</h3>
    <p>R499</p>
    <button>Buy Now</button>
  </div>
  <div class="card">
    <div class="badge">Hot!</div>
    <img src="images/product3.jpg" alt="Product 3">
    <h3>Product 3</h3>
    <p>R150</p>
    <button>Buy Now</button>
  </div>
  <!-- Add more premium product cards -->
</section>

<footer>
  <p>© 2026 Trending Products SA | Follow us on social media!</p>
</footer>

</body>
  </html>
