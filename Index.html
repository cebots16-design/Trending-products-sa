<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [
  {
    title:"Creative Graphic",
    desc:"Poster design for campaign",
    tools:"Photoshop, Illustrator",
    category:"graphic",
    img:"https://source.unsplash.com/random/800x450?design"
  }
];

const feed = document.getElementById("feed");
const modal = document.getElementById("modal");

const mimg = document.getElementById("mimg");
const mtitle = document.getElementById("mtitle");
const mdesc = document.getElementById("mdesc");
const mtools = document.getElementById("mtools");
const closeBtn = document.getElementById("close");

function save(){
  localStorage.setItem("posts", JSON.stringify(posts));
}

/* =======================
   RENDER FUNCTION (SAFE)
======================= */
function render(filter="all"){
  feed.innerHTML="";

  const filtered = posts.filter(p => filter==="all" || p.category===filter);

  if(filtered.length === 0){
    feed.innerHTML = "<p>No posts found.</p>";
    return;
  }

  filtered.forEach((p)=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.img}" alt="post image">
      <div class="card-content">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <p class="tools">${p.tools}</p>
      </div>
      <div class="card-actions">
        <button class="like">❤️ Like</button>
        <button class="comment">💬 Comment</button>
        <button class="share">🔗 Share</button>
      </div>
    `;

    /* =======================
       FORCE CLICK WORKING
    ======================= */
    const img = card.querySelector("img");

    img.addEventListener("click", () => {
      console.log("Modal opened:", p.title);

      mimg.src = p.img;
      mtitle.textContent = p.title;
      mdesc.textContent = p.desc;
      mtools.textContent = p.tools;

      modal.style.display = "flex";
    });

    /* optional feedback so you KNOW it clicked */
    card.querySelector(".like").onclick = () => {
      alert("Liked ❤️");
    };

    feed.appendChild(card);
  });
}

/* =======================
   FILTERS
======================= */
document.querySelectorAll(".filters button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filters button")
      .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");
    render(btn.dataset.filter);
  });
});

/* =======================
   FORM (CONFIRMED WORKING)
======================= */
document.getElementById("postForm").addEventListener("submit",(e)=>{
  e.preventDefault();

  const newPost={
    title:document.getElementById("title").value.trim(),
    desc:document.getElementById("desc").value.trim(),
    tools:document.getElementById("tools").value.trim(),
    category:document.getElementById("category").value,
    img:document.getElementById("img").value.trim()
  };

  if(!newPost.title || !newPost.desc || !newPost.img){
    alert("Please fill in all required fields");
    return;
  }

  posts.unshift(newPost);
  save();
  render();

  alert("Post published successfully 🚀");

  e.target.reset();
});

/* =======================
   MODAL CLOSE (ROBUST)
======================= */
closeBtn.addEventListener("click",()=>{
  modal.style.display="none";
});

modal.addEventListener("click",(e)=>{
  if(e.target === modal){
    modal.style.display="none";
  }
});

/* =======================
   INIT
======================= */
render();
</script>
