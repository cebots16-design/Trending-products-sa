<!DOCTYPE html>
<html>
<head>
  <title>Trending Products SA</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: black;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 Trending Products SA</h1>
  <p>Find the hottest viral products</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="TikTok Product">
    <h2>Top 3 Viral TikTok Products</h2>
    <p>Check out what everyone is buying right now.</p>
    <a class="btn" href="#">View Products</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Gadgets">
    <h2>Best Gadgets Under R300</h2>
    <p>Cheap and useful tech you need.</p>
    <a class="btn" href="#">See Deals</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Fashion">
    <h2>Trending Fashion 2026</h2>
    <p>What’s hot right now in SA fashion.</p>
    <a class="btn" href="#">Explore</a>
  </div>

</div>

</body>
</html>
